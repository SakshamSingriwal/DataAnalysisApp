[build-system]\nrequires = [\"setuptools>=65.0\", \"wheel\"]\nbuild-backend = \"setuptools.build_meta\"\n\n[project]\nname = \"DataAnalysisApp\"\nversion = \"1.0.0\"\ndescription = \"Professional Data Analytics & Machine Learning Platform\"\nreadme = \"README.md\"\nrequires-python = \">=3.8\"\nlicense = {text = \"MIT\"}\nauthors = [\n    {name = \"Saksham Singriwal\", email = \"contact@example.com\"},\n]\nkeywords = [\n    \"data-analysis\",\n    \"machine-learning\",\n    \"deep-learning\",\n    \"data-science\",\n    \"streamlit\",\n    \"analytics\",\n]\nclassifiers = [\n    \"Development Status :: 4 - Beta\",\n    \"Intended Audience :: Data Scientists\",\n    \"Topic :: Scientific/Engineering :: Artificial Intelligence\",\n    \"License :: OSI Approved :: MIT License\",\n    \"Programming Language :: Python :: 3\",\n    \"Programming Language :: Python :: 3.8\",\n    \"Programming Language :: Python :: 3.9\",\n    \"Programming Language :: Python :: 3.10\",\n    \"Programming Language :: Python :: 3.11\",\n]\n\n[project.urls]\nHomepage = \"https://github.com/SakshamSingriwal/DataAnalysisApp\"\nDocumentation = \"https://github.com/SakshamSingriwal/DataAnalysisApp#readme\"\nRepository = \"https://github.com/SakshamSingriwal/DataAnalysisApp.git\"\nIssues = \"https://github.com/SakshamSingriwal/DataAnalysisApp/issues\"\n\n[tool.setuptools]\npackage-dir = {\"\": \".\"}\n\n[tool.black]\nline-length = 100\ntarget-version = [\"py38\", \"py39\", \"py310\", \"py311\"]\nexclude = \"\"\"\n/(\n  | \\.git\n  | \\.venv\n  | _build\n  | buck-out\n  | build\n  | dist\n  | __pycache__\n)/\n\"\"\"\n\n[tool.isort]\nprofile = \"black\"\nline_length = 100\nskip_gitignore = true\n\n[tool.mypy]\npython_version = \"3.8\"\nwarn_return_any = true\nwarn_unused_configs = true\ndisallow_untyped_defs = false\n"